<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Tiro 2D</title>
  <style>
    body { margin:0; background:#10151b; color:#fff; font-family:Arial, sans-serif; display:grid; place-items:center; min-height:100vh; }
    .box { background:rgba(255,255,255,0.06); padding:28px; border-radius:16px; max-width:700px; }
    a { color:#7dcfff; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Multi Tiro 2D</h1>
    <p>Servidor autoritativo com visão limitada por linha de visão, cone de mira e scopes 2x / 4x / 8x.</p>
    <p><a href="/game/">Entrar no jogo</a></p>
    <p>Controles: WASD, clique esquerdo, botão direito para ADS, Q/scroll troca arma, R recarrega, 3/4/5 escolhe scope.</p>
  </div>
</body>
</html>
