<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Mapas PRO+</title>

    <link rel="stylesheet" href="../styles/editor.css">
    <link rel="icon" href="data:,">

    <script type="module" src="./editor.js" defer></script>
</head>

<body>

<h2>Editor de Mapa PRO+</h2>

<div id="toolbar">
    Largura:
    <input type="number" id="mapWidth" value="10" min="5" max="200">

    Altura:
    <input type="number" id="mapHeight" value="10" min="5" max="200">

    <button id="resizeBtn">Redimensionar</button>

    Camada:
    <select id="layerSelect">
        <option value="collision">Collision</option>
        <option value="interactive">Interactive</option>
        <option value="items">Items</option>
    </select>

    <button id="exportBtn">Exportar</button>
    <button id="clearBtn">Limpar</button>

    <input type="file" id="fileInput">
</div>

<div>
    <label class="layer-toggle">
        <input type="checkbox" id="showCollision" checked> Collision
    </label>

    <label class="layer-toggle">
        <input type="checkbox" id="showInteractive" checked> Interactive
    </label>

    <label class="layer-toggle">
        <input type="checkbox" id="showItems" checked> Items
    </label>
</div>

<div id="palette"></div>

<canvas id="canvas" width="800" height="600"></canvas>

</body>
</html>
